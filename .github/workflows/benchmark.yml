name: Benchmark
on: [push]
jobs:
  run-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check CPU
        run: lscpu
      - name: Compile and Run TSan
        run: |
          g++ -O3 -mavx2 -mfma -pthread -fsanitize=thread main.cpp -o matrix_tsan
          ./matrix_tsan
      - name: Compile Optimized
        run: g++ -O3 -mavx2 -mfma -pthread -march=native main.cpp -o matrix
      - name: Run Benchmark 1
        run: ./matrix
      - name: Run Benchmark 2
        run: ./matrix
      - name: Run Benchmark 3
        run: ./matrix
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results.csv
